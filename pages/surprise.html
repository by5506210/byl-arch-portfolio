<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>? — Bryan Youn</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap');

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0a;
      min-height: 100vh;
      overflow: hidden;
      cursor: default;
    }

    .surprise__img {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
    }

    .surprise__img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .surprise__back {
      position: fixed;
      top: 2rem;
      left: 2rem;
      z-index: 10;
      font-family: 'Courier Prime', 'Courier New', Courier, monospace;
      font-size: 1rem;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.95);
      text-decoration: none;
      transition: opacity 0.3s ease;
    }

    .surprise__back:hover {
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <div class="surprise__img">
    <img src="https://images.unsplash.com/photo-1518020382113-a7e8fc38eac9?w=2400&q=90&fit=crop" alt="Dachshund">
  </div>
  <a href="../index.html" class="surprise__back">&larr;</a>
</body>
</html>
