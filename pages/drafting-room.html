<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DRAFTING ROOM &mdash; Bryan Youn</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://unpkg.com/@barba/core@2.10.3/dist/barba.umd.js"></script>
  <link rel="stylesheet" href="../src/css/style.css">
</head>
<body>
  <div class="grain"></div>
  <div data-barba="wrapper">
    <main data-barba="container" data-barba-namespace="drafting-room">
      <div class="drafting-room-page">
        <canvas id="vector-field" class="vector-field-bg" data-color="dark"></canvas>

        <article class="drafting-room-poster" aria-label="Abstract architectural composition">
          <div class="drafting-room-frame" aria-hidden="true">
            <div class="drafting-room-layer drafting-room-layer--grid"></div>
            <div class="drafting-room-layer drafting-room-layer--plan"></div>
            <div class="drafting-room-layer drafting-room-layer--axes"></div>
            <div class="drafting-room-layer drafting-room-layer--dots"></div>
            <div class="drafting-room-layer drafting-room-layer--beams"></div>
          </div>

          <div class="drafting-room-strip" aria-hidden="true">
            <span class="drafting-room-strip__cell"></span>
            <span class="drafting-room-strip__cell"></span>
            <span class="drafting-room-strip__cell"></span>
            <span class="drafting-room-strip__cell"></span>
            <span class="drafting-room-strip__cell"></span>
            <span class="drafting-room-strip__cell"></span>
            <span class="drafting-room-strip__cell"></span>
            <span class="drafting-room-strip__cell"></span>
            <span class="drafting-room-strip__cell"></span>
            <span class="drafting-room-strip__cell"></span>
            <span class="drafting-room-strip__cell"></span>
            <span class="drafting-room-strip__cell"></span>
            <span class="drafting-room-strip__cell"></span>
            <span class="drafting-room-strip__cell"></span>
            <span class="drafting-room-strip__cell"></span>
            <span class="drafting-room-strip__cell"></span>
            <span class="drafting-room-strip__cell"></span>
            <span class="drafting-room-strip__cell"></span>
            <span class="drafting-room-strip__cell"></span>
            <span class="drafting-room-strip__cell"></span>
            <span class="drafting-room-strip__cell"></span>
            <span class="drafting-room-strip__cell"></span>
            <span class="drafting-room-strip__cell"></span>
            <span class="drafting-room-strip__cell"></span>
            <span class="drafting-room-strip__cell"></span>
            <span class="drafting-room-strip__cell"></span>
            <span class="drafting-room-strip__cell"></span>
            <span class="drafting-room-strip__cell"></span>
            <span class="drafting-room-strip__cell"></span>
            <span class="drafting-room-strip__cell"></span>
            <span class="drafting-room-strip__cell"></span>
            <span class="drafting-room-strip__cell"></span>
            <span class="drafting-room-strip__cell"></span>
            <span class="drafting-room-strip__cell"></span>
            <span class="drafting-room-strip__cell"></span>
            <span class="drafting-room-strip__cell"></span>
          </div>
        </article>
      </div>
    </main>
  </div>

  <script src="../src/js/cursor.js"></script>
  <script src="../src/js/vector-field.js"></script>
  <script src="../src/js/transitions.js"></script>
</body>
</html>
